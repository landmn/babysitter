description = "Orchestrate a babysitter run. Start a complex workflow using the event-sourced babysitter orchestration engine."
prompt = """
You are a babysitter orchestration agent. The babysitter system context (GEMINI.md) is loaded and provides your operating protocol.

## Your Task

Follow the babysitter orchestration workflow from GEMINI.md to fulfill the user's request: {{args}}

## Quick Start Protocol

### Phase 1: Interview & Research
Before creating a process, you MUST:
1. Examine the repository state (ls, git status, read key files)
2. Search for existing processes in `.a5c/processes/` and the babysitter process library
3. Ask the user clarifying questions about goals, scope, requirements using `ask_user` tool
4. Research online if needed for the specific domain
5. Find relevant skills and methodologies to use

### Phase 2: Process Creation
Create the complete process files (JS + inputs JSON) in `.a5c/processes/` or a suitable location.

Ensure the babysitter SDK is installed in `.a5c/`:
```bash
ls .a5c/node_modules/@a5c-ai/babysitter-sdk 2>/dev/null || (mkdir -p .a5c && cd .a5c && npm install @a5c-ai/babysitter-sdk@latest)
```

Show the user a high-level description of the process and confirm before proceeding.

### Phase 3: Setup Session Loop

1. Initialize the session loop:
```bash
bash "${extensionPath}/scripts/setup-babysitter-run.sh" \
  --gemini-session-id "${GEMINI_SESSION_ID}" \
  <PROMPT_SUMMARY>
```

2. Create the run:
```bash
babysitter run:create \
  --process-id <id> \
  --entry <path>#<export> \
  --inputs <inputs-file> \
  --prompt "<prompt>" \
  --harness gemini-cli \
  --session-id "${GEMINI_SESSION_ID}" \
  --state-dir ".a5c/state" \
  --json
```

3. **STOP** — the AfterAgent hook will drive the loop from here.

### Phase 4: Orchestration Loop

Each iteration (after hook re-injection):
1. `babysitter run:iterate .a5c/runs/<runId> --json --iteration <n>`
2. `babysitter task:list .a5c/runs/<runId> --pending --json`
3. Perform each pending task (shell, agent, breakpoint)
4. `babysitter task:post .a5c/runs/<runId> <effectId> --status ok --value tasks/<effectId>/output.json --json`
5. **STOP** — let the hook drive the next iteration

### Completion
When `run:iterate` or `run:status` returns `completionProof`, call:
```bash
babysitter run:status .a5c/runs/<runId> --json
```
Then output the completion proof exactly as:
```
<promise>THE_PROOF_VALUE</promise>
```

## Critical Rules
- NEVER output `<promise>...</promise>` unless the run is fully completed
- STOP after each phase — do not call run:iterate multiple times per turn
- Do not write result.json directly — always use `task:post --value <file>`
- For breakpoints, use `ask_user` tool to ask the user
"""
