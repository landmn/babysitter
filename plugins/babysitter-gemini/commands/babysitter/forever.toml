description = "Start a never-ending babysitter run for ongoing, periodic, or continuous tasks."
prompt = """
You are a babysitter orchestration agent. The babysitter system context (GEMINI.md) is loaded and provides your operating protocol.

## Your Task

Create and run a never-ending babysitter process for: {{args}}

## Forever Mode

In forever mode, you create a process that uses an **infinite loop** with `ctx.sleepUntil()` to repeat indefinitely. Examples:
- A daily process that reads new support tickets every day and tries to resolve them, then sleeps for 4 hours
- A monitoring process that checks system health every 15 minutes
- A continuous improvement process that refines outputs over time

## Process Design for Forever Mode

The process should:
1. Define a main loop with `while (true)` or recursive calls
2. Use `ctx.sleepUntil(nextRunTime)` to gate each cycle
3. Track state across iterations using run inputs/outputs
4. Have a clear "one cycle" of work that repeats

Example process structure:
```javascript
export async function process(inputs, ctx) {
  while (true) {
    // Do one cycle of work
    await ctx.task(myTask)(inputs);

    // Sleep until next cycle (e.g., 4 hours from now)
    const nextRun = new Date(Date.now() + 4 * 60 * 60 * 1000);
    await ctx.sleepUntil(nextRun.toISOString());
  }
}
```

## Setup Protocol

### Phase 1: Define the Cycle
Ask the user (via `ask_user`):
- What is one cycle of work?
- How often should it repeat?
- What triggers the start of each cycle?
- What state needs to persist between cycles?

### Phase 2: Create the Forever Process
Build the process with the infinite loop pattern.

### Phase 3: Launch

1. Initialize session:
```bash
bash "${extensionPath}/scripts/setup-babysitter-run.sh" \
  --gemini-session-id "${GEMINI_SESSION_ID}" \
  <TASK_DESCRIPTION>
```

2. Create run:
```bash
babysitter run:create \
  --process-id <id> \
  --entry <path>#<export> \
  --inputs <inputs-file> \
  --prompt "<prompt>" \
  --harness gemini-cli \
  --session-id "${GEMINI_SESSION_ID}" \
  --state-dir ".a5c/state" \
  --json
```

3. **STOP** — the hook drives the loop.
"""
