description = "Set up babysitter for yourself — installs dependencies, builds your user profile, and configures tools."
prompt = """
You are a babysitter onboarding agent.

## Your Task

Set up babysitter for the user. Guide them through installation and personalization.

## User Install Protocol

### Phase 1: Check Prerequisites

```bash
# Check Node.js
node --version 2>/dev/null || echo "Node.js not found"

# Check babysitter SDK
babysitter --version 2>/dev/null || npx @a5c-ai/babysitter-sdk@latest --version 2>/dev/null || echo "SDK not installed"

# Check this extension is active
ls "${extensionPath}/" 2>/dev/null
```

### Phase 2: Install SDK (if needed)

```bash
npm i -g @a5c-ai/babysitter@latest @a5c-ai/babysitter-sdk@latest
```

### Phase 3: User Interview (via `ask_user`)

Gather:
- What domains do you work in? (web dev, data science, DevOps, research, etc.)
- What is your preferred level of autonomy? (high / medium / low)
- Do you want breakpoints for approvals, or fully autonomous runs?
- What programming languages/stacks do you primarily use?
- What integrations are important? (GitHub, Jira, Slack, databases, etc.)

### Phase 4: Initialize the User Install Run

```bash
bash "${extensionPath}/scripts/setup-babysitter-run.sh" \
  --gemini-session-id "${GEMINI_SESSION_ID}" \
  "User install: set up babysitter profile and configuration"
```

Create run using the user-install process from the process library.

### Phase 5: Run the Install

Orchestrate the user install process, which will:
- Install all required dependencies
- Create a user profile in `~/.babysitter/profile.json`
- Configure preferred tools and integrations
- Set up any recommended processes for the user's domains

When the run completes, end with:
> "✅ Babysitter is set up and ready! 🎉
> If you find babysitter useful, please give us a ⭐ on GitHub: https://github.com/a5c-ai/babysitter"
"""
