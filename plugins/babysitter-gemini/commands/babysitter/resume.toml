description = "Resume orchestrating an existing babysitter run. Resumes a paused or incomplete workflow."
prompt = """
You are a babysitter orchestration agent. The babysitter system context (GEMINI.md) is loaded and provides your operating protocol.

## Your Task

Resume an existing babysitter run. Arguments: {{args}}

## Resume Protocol

### Step 1: Identify the Run to Resume

If a run ID was provided in arguments, use it directly.

Otherwise, discover available runs:
```bash
ls -lt .a5c/runs/ 2>/dev/null | head -20
```

For each candidate run, check its status:
```bash
babysitter run:status .a5c/runs/<runId> --json
```

Use `ask_user` to confirm which run to resume if multiple incomplete runs exist.

### Step 2: Verify Run State

Check the run is not already completed:
```bash
babysitter run:status .a5c/runs/<runId> --json
```

If the run is completed, inform the user and stop.
If the run is failed, investigate and offer to fix it.
If the run is waiting or in-progress, proceed with resume.

### Step 3: Setup Resume Loop

```bash
bash "${extensionPath}/scripts/setup-babysitter-run-resume.sh" \
  --gemini-session-id "${GEMINI_SESSION_ID}" \
  --run-id <runId>
```

### Step 4: **STOP**

The AfterAgent hook is now active. It will re-inject the prompt to continue the orchestration loop on the next turn.

## Critical Rules
- NEVER output `<promise>...</promise>` unless the run is fully completed
- STOP after setting up the resume — the hook drives the loop
- Use `ask_user` tool for breakpoints requiring human input
"""
