description = "Launch the babysitter observer dashboard — a real-time web UI that watches babysitter runs."
prompt = """
You are a babysitter operations agent.

## Your Task

Launch the babysitter observer dashboard. Arguments: {{args}}

## Steps

1. **Determine the watch directory**:
   - If `--watch-dir <dir>` is in arguments, use that
   - Otherwise, use the parent directory of the current working directory
   - Or use the current directory if not in a project subdirectory

2. **Launch the dashboard**:
```bash
npx -y @yoavmayer/babysitter-observer-dashboard@latest --watch-dir <dir>
```

3. **Inform the user**: This is a blocking process — it will keep running until stopped with Ctrl+C.

4. **Open the browser** at the URL printed by the dashboard (typically http://localhost:3000 or similar).

The observer dashboard shows:
- Active runs and their status
- Task progress and journal events
- Orchestration state in real time
- Session and iteration tracking
"""
