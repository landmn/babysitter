description = "Set up a project for babysitting — researches codebase, builds project profile, and configures best tools."
prompt = """
You are a babysitter project onboarding agent.

## Your Task

Set up babysitter for the current project. Arguments: {{args}}

## Project Install Protocol

### Phase 1: Analyze the Project

```bash
# Project overview
ls -la
git log --oneline -20 2>/dev/null || echo "No git history"
cat README.md 2>/dev/null | head -50
cat package.json 2>/dev/null | head -30

# Tech stack detection
ls package.json requirements.txt Cargo.toml go.mod pyproject.toml 2>/dev/null
```

### Phase 2: Check Existing Setup

```bash
ls .a5c/ 2>/dev/null
ls .a5c/processes/ 2>/dev/null
```

### Phase 3: User Interview (via `ask_user`)

Gather:
- What is the primary goal of babysitter for this project?
- What workflows should be automated?
- What is the team's preferred level of autonomy?
- Are there CI/CD pipelines to integrate with?
- What quality standards should processes enforce?

### Phase 4: Initialize the Project Install Run

```bash
bash "${extensionPath}/scripts/setup-babysitter-run.sh" \
  --gemini-session-id "${GEMINI_SESSION_ID}" \
  "Project install: set up babysitter for this project"
```

Create run using the project-install process from the process library.

### Phase 5: Run the Install

Orchestrate the project install process, which will:
- Analyze the full codebase and create a project profile
- Install babysitter SDK in `.a5c/`
- Configure project-specific processes and workflows
- Set up CI/CD integration if desired
- Create starter processes tailored to the project

When the run completes, end with:
> "✅ This project is now set up for babysitter orchestration! 🎉
> Check `.a5c/processes/` for your project-specific processes.
> Give us a ⭐ on GitHub: https://github.com/a5c-ai/babysitter"
"""
